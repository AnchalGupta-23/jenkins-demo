<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attractive Web Page</title>

<style>

body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(120deg,#6a11cb,#2575fc);
    color:white;
}

/* Navbar */

nav{
    display:flex;
    justify-content:space-between;
    padding:20px 50px;
    background: rgba(0,0,0,0.2);
}

nav h2{
    margin:0;
}

nav ul{
    list-style:none;
    display:flex;
    gap:20px;
}

nav ul li{
    cursor:pointer;
}

/* Hero Section */

.hero{
    text-align:center;
    margin-top:120px;
}

.hero h1{
    font-size:50px;
}

.hero p{
    font-size:20px;
}

/* Button */

button{
    padding:12px 30px;
    border:none;
    border-radius:25px;
    background:white;
    color:#2575fc;
    font-size:16px;
    cursor:pointer;
    margin-top:20px;
}

button:hover{
    background:#ddd;
}

</style>
</head>

<body>

<nav>
<h2>MyWebsite</h2>

<ul>
<li>Home</li>
<li>About</li>
<li>Services</li>
<li>Contact</li>
</ul>

</nav>

<div class="hero">

<h1>Welcome to My Website</h1>

<p>Create Beautiful Websites with HTML & CSS</p>

<button>Get Started</button>

</div>

</body>
</html>
